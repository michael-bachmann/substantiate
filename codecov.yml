# Codecov config. Enforcement of the coverage floor lives in vitest
# (apps/extension/vitest.config.ts `coverage.thresholds`), which fails CI on its
# own. Codecov here is for the README badge + per-PR visibility, so its status
# checks are informational — they annotate, they don't block the merge.

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Coverage is scoped to extension domain logic; vitest already filters the lcov
# report to lib/ (the I/O boundary is excluded), so the `extension` flag just
# labels that carrier.
flags:
  extension:
    paths:
      - apps/extension/

comment:
  layout: "reach, diff, flags, files"
  require_changes: true # only comment on PRs that actually move coverage
