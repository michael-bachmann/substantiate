<!-- Canonical brand glyph: a receipt (rounded doc with a torn/zigzag bottom edge)
     with a check inside — substantiate = save / verify the receipt. Single source
     of truth: rendered as a React component by Logo.tsx (via vite-plugin-svgr
     `?react`) and rasterized into the extension's manifest icons by
     @wxt-dev/auto-icons. Uses the literal terracotta value (the terra token in
     styles/theme.css) rather than currentColor, since the icon build rasterizes
     this file outside the DOM where CSS vars and currentColor don't resolve. -->
<svg width="128" height="128" viewBox="0 0 24 24" fill="none" stroke="#C0603A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
  <path d="M6 4H18V18.5L16 20 14 18.5 12 20 10 18.5 8 20 6 18.5Z" />
  <path d="M8.7 10.9 10.9 13.1 15.3 8.5" />
</svg>
