packages:
  - "apps/*"
  - "packages/*"

# Pre-approve the few dependencies that legitimately need an install/build step
# (pnpm 10 blocks lifecycle scripts by default). sharp is pulled in by
# @wxt-dev/auto-icons to rasterize the manifest icons; esbuild + @tailwindcss/oxide
# fetch their prebuilt native binaries.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - "@tailwindcss/oxide"
