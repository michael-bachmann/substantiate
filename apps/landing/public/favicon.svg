<!-- Favicon = the brand receipt glyph (mark.svg) on a filled terracotta badge,
     so it stays legible at 16px in a browser tab where thin line-art on a
     transparent ground would wash out. Same receipt-with-check the Logo and the
     extension's manifest icons use; badge fill is the terra token (#C0603A),
     glyph is the paper2 cream so it reads on the fill. -->
<svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="24" height="24" rx="6.5" fill="#C0603A" />
  <g stroke="#FCF8EF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 5H17V17.5L15.4 19 13.7 17.6 12 19 10.3 17.6 8.6 19 7 17.5Z" />
    <path d="M9.4 11.2 11.3 13.1 15 8.9" />
  </g>
</svg>
