name = "substantiate-landing"
compatibility_date = "2026-06-01"

# Only serve on the custom domains (substantiate.dev / www.substantiate.dev).
# Without these, deploy re-enables the workers.dev URL and per-deploy preview
# URLs by default, which would expose the site at a second, non-canonical host.
workers_dev = false
preview_urls = false

# Serve on the canonical custom domains. The zone is on this same Cloudflare
# account, so `wrangler deploy` provisions the hostnames + edge certs itself
# (custom_domain routes, not workers.dev). www serves the same assets; a
# www→apex redirect, if wanted, is a separate Cloudflare rule.
routes = [
  { pattern = "substantiate.dev", custom_domain = true },
  { pattern = "www.substantiate.dev", custom_domain = true },
]

# Static marketing site: no Worker script, just the Vite build served as assets.
# `directory` is resolved relative to this file, so it points at apps/landing/dist.
[assets]
directory = "./dist"
